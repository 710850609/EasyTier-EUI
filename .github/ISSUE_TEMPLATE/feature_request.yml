name: ✨ 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出功能建议！请详细描述您的想法。

  - type: textarea
    id: problem
    attributes:
      label: 您的功能建议是否与某个问题相关？
      description: 请描述您遇到的问题或不便之处
      placeholder: "例如：我在使用...时，经常需要..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 您期望的解决方案
      description: 描述您希望实现的功能或改进
      placeholder: 描述您期望的功能...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 您考虑过的替代方案
      description: 是否有其他替代方案可以解决您的问题？
      placeholder: 描述您考虑过的替代方案...
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 涉及范围
      description: 这个功能主要涉及哪个方面？
      options:
        - 配置管理
        - 节点管理
        - 应用下载/更新
        - 设置/关于
        - 界面/交互
        - 其他
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他相关的信息或截图
    validations:
      required: false