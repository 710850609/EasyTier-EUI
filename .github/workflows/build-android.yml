name: Build Android APK

on:
  push:
    branches: [main, master, feature/apk]
    paths:
      - 'android/**'
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Copy Frontend to Android Assets
        run: |
          mkdir -p android/app/src/main/assets/frontend
          cp -r frontend/dist/* android/app/src/main/assets/frontend/

      - name: Copy Python Backend
        run: |
          mkdir -p android/app/src/main/python
          cp -r backend/* android/app/src/main/python/

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Setup Gradle
        run: |
          curl -L -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Debug - Test Chaquopy Maven repo
        run: |
          echo "=== Testing Chaquopy Maven repo ==="
          curl -I --max-time 10 https://chaquo.com/maven/com/chaquo/python/gradle/15.0.1/gradle-15.0.1.pom 2>&1 || echo "FAILED"
          echo ""
          echo "=== Testing Maven Central for plugin marker ==="
          curl -I --max-time 10 https://repo1.maven.org/maven2/com/chaquo/python/com.chaquo.python.gradle.plugin/15.0.1/com.chaquo.python.gradle.plugin-15.0.1.pom 2>&1 || echo "FAILED"
          echo ""
          echo "=== Testing Maven Central for plugin JAR ==="
          curl -I --max-time 10 https://repo1.maven.org/maven2/com/chaquo/python/gradle/15.0.1/gradle-15.0.1.pom 2>&1 || echo "FAILED"

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyTier-EUI-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30