name: Build Package

on:
  workflow_dispatch:
    inputs:
      no-draft:
        description: '对外公布下载(No Draft)'
        type: boolean
        default: true
      build-fnos:
        description: '构建 FnOS (多架构)'
        type: boolean
        default: true
      build_windows:
        description: '构建 Windows (AMD64)'
        type: boolean
        default: true
      build_macos_arm64:
        description: '构建 macOS (ARM64, Apple Silicon)'
        type: boolean
        default: true
      build_macos_x64:
        description: '构建 macOS (x86_64, Intel)'
        type: boolean
        default: true
      build_linux_amd64:
        description: '构建 Linux (AMD64)'
        type: boolean
        default: true
      build_linux_arm64:
        description: '构建 Linux (ARM64)'
        type: boolean
        default: true
      build_linux_riscv64:
        description: '构建 Linux (RISC-V 64)'
        type: boolean
        default: true
      build_linux_armv7:
        description: '构建 Linux (ARMv7)'
        type: boolean
        default: true

env:
  PYTHON_VERSION: '3.12'

permissions:
  contents: write

jobs:
  build-info:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.release-info.outputs.prerelease }}
      version: ${{ steps.release-info.outputs.version }}
      et_ver: ${{ steps.release-info.outputs.et_ver }}
      release_notes: ${{ steps.release-info.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
      - name: Get Release Version And Notes
        id: release-info
        run: |          
          if [[ -f "./build-info.sh" || -f "./version-util.sh" ]]; then
            chmod +x version-util.sh
            chmod +x build-info.sh
          
            source build-info.sh "unknown" "unknown" "unknown" "unknown"
            # 从脚本获取实际计算后的值（注意大小写）
            et_ver="${ET_VER}"
            build_ver="${BUILD_VER}"
            release_notes="${CHANGE_NOTES}"
            prerelease="${PRE_RELEASE}"
          else
            echo "错误：build-info.sh 或 version-util.sh 不存在" >&2
            exit 1
          fi
          
          echo '是否正式版: '$([[ "${prerelease}" == "false" ]] && echo "是" || echo "否")
          echo "内置 EasyTier 版本: ${et_ver}"            
          echo "构建版本: ${build_ver}"            
          echo "变更日志: ${release_notes}"
          
          echo "prerelease=${prerelease}" >> $GITHUB_OUTPUT
          echo "et_ver=${et_ver}" >> $GITHUB_OUTPUT
          echo "version=${build_ver}" >> $GITHUB_OUTPUT
          {
            echo "release_notes<<GH_OUTPUT_EOF"
            echo "$release_notes"
            echo "GH_OUTPUT_EOF"
          } >> $GITHUB_OUTPUT

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'  # 指定路径

      - name: Install dependencies
        working-directory: frontend  # 在 frontend 目录执行
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-fnos:
    if: ${{ github.event.inputs.build-fnos == 'true' }}
    needs: [ build-frontend, build-info ]
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-latest
          # - arch: riscv64
          #   runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'  # 指定路径

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Run build
        run: |
          echo "开始构建架构: ${{ matrix.arch }}"
          echo "Node 版本: $(node -v)"
          chmod +x ./fnpack.sh 2>/dev/null || true
          chmod +x ./version-util.sh 2>/dev/null || true
          chmod +x ./build-info.sh 2>/dev/null || true
          chmod +x ./build.sh 2>/dev/null || true
          ./build.sh arch=${{ matrix.arch }} et_ver="${{ needs.build-info.outputs.et_ver }}" build_ver="${{ needs.build-info.outputs.version }}" build_all="false" download_proxy="false" 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpk-${{ matrix.arch }}
          path: EasyTier-EUI*.fpk

  build-windows-amd64:
    if: ${{ github.event.inputs.build_windows == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: %LocalAppData%\pip\Cache
          key: win64-pip-${{ hashFiles('backend/requirements-base.txt', 'backend/requirements-gui.txt') }}

      - name: Install UPX
        run: |
          choco install upx
          upx --version

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build
        run: cd backend && python build.py --et_ver "${{ needs.build-info.outputs.et_ver }}" --build_ver "${{ needs.build-info.outputs.version }}" --github_proxy_url "" --pip_cache_dir %LocalAppData%\pip\Cache
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: backend/dist/*.zip

  build-macos-amd64:
    if: ${{ github.event.inputs.build_macos_x64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python (x86_64)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: 'x64'
      - name: Upgrade pip (x86_64)
        run: arch -x86_64 pip install --upgrade pip
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build (x86_64)
        run: |
          cd backend
          arch -x86_64 python3 build.py --et_ver "${{ needs.build-info.outputs.et_ver }}" --build_ver "${{ needs.build-info.outputs.version }}" --github_proxy_url ""
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: backend/dist/*.zip

  build-macos-arm64:
    if: ${{ github.event.inputs.build_macos_arm64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: arm64
      - name: Upgrade pip
        run: pip install --upgrade pip
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build
        run: cd backend && python3 build.py --et_ver "${{ needs.build-info.outputs.et_ver }}" --build_ver "${{ needs.build-info.outputs.version }}" --github_proxy_url ""
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: backend/dist/*.zip

  build-linux-amd64:
    if: ${{ github.event.inputs.build_linux_amd64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build
        run: cd backend && python3 build.py --et_ver "${{ needs.build-info.outputs.et_ver }}" --build_ver "${{ needs.build-info.outputs.version }}" --github_proxy_url ""
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: backend/dist/*.zip

  build-linux-arm64:
    if: ${{ github.event.inputs.build_linux_arm64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: riscv64-pip-${{ hashFiles('backend/requirements-base.txt', 'backend/requirements-gui.txt') }}

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build
        run: cd backend && python3 build.py --et_ver "${{ needs.build-info.outputs.et_ver }}" --build_ver "${{ needs.build-info.outputs.version }}" --github_proxy_url ""  --pip_cache_dir ~/.cache/pip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: backend/dist/*.zip

