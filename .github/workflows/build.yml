name: Build Package

on:
  workflow_dispatch:
    inputs:
      no-draft:
        description: '对外公布下载(No Draft)'
        type: boolean
        default: true
      build-fnos:
        description: '构建 FnOS (多架构)'
        type: boolean
        default: true
      build_windows:
        description: '构建 Windows (amd64)'
        type: boolean
        default: true
      build_macos_arm64:
        description: '构建 macOS (aarch64, Apple Silicon)'
        type: boolean
        default: true
      build_macos_x64:
        description: '构建 macOS (x86_64, Intel)'
        type: boolean
        default: true
      build_linux_amd64:
        description: '构建 Linux (amd64)'
        type: boolean
        default: true
      build_linux_arm64:
        description: '构建 Linux (aarch64)'
        type: boolean
        default: true
      build_linux_riscv64:
        description: '构建 Linux (risc-v 64)'
        type: boolean
        default: true
      build_linux_armv7:
        description: '构建 Linux (armv7)'
        type: boolean
        default: true
      build_linux_alpine:
        description: '构建 Linux (Alpine)'
        type: boolean
        default: true

env:
  PYTHON_VERSION: '3.12'

permissions:
  contents: write

jobs:
  build-info:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.release-info.outputs.prerelease }}
      version: ${{ steps.release-info.outputs.version }}
      et_ver: ${{ steps.release-info.outputs.et_ver }}
      release_notes: ${{ steps.release-info.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
      - name: Get Release Version And Notes
        id: release-info
        run: |          
          if [[ -f "./build-info.sh" || -f "./version-util.sh" ]]; then
            chmod +x version-util.sh
            chmod +x build-info.sh
          
            source build-info.sh "unknown" "unknown" "unknown" "unknown"
            # 从脚本获取实际计算后的值（注意大小写）
            et_ver="${ET_VER}"
            build_ver="${BUILD_VER}"
            release_notes="${CHANGE_NOTES}"
            prerelease="${PRE_RELEASE}"
          else
            echo "错误：build-info.sh 或 version-util.sh 不存在" >&2
            exit 1
          fi
          # 使用英文，避免 $() 执行导致乱码
          echo '是否正式版: '$([[ "${prerelease}" == "false" ]] && echo "Yes" || echo "No")
          echo "内置 EasyTier 版本: ${et_ver}"            
          echo "构建版本: ${build_ver}"            
          echo "变更日志: ${release_notes}"
          
          echo "prerelease=${prerelease}" >> $GITHUB_OUTPUT
          echo "et_ver=${et_ver}" >> $GITHUB_OUTPUT
          echo "version=${build_ver}" >> $GITHUB_OUTPUT
          {
            echo "release_notes<<GH_OUTPUT_EOF"
            echo "$release_notes"
            echo "GH_OUTPUT_EOF"
          } >> $GITHUB_OUTPUT

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'  # 指定路径

      - name: Install dependencies
        working-directory: frontend  # 在 frontend 目录执行
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-frontend-user:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'  # 指定路径

      - name: Install dependencies
        working-directory: frontend  # 在 frontend 目录执行
        run: npm install

      - name: Build frontend User Version
        working-directory: frontend
        run: npm run build-user

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-user-dist
          path: frontend/dist

  build-fnos:
    if: ${{ github.event.inputs.build-fnos == 'true' }}
    needs: [ build-frontend, build-frontend-user, build-info ]
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            app_name: 'EasyTier-EUI'
          - arch: aarch64
            runner: ubuntu-latest
            app_name: 'EasyTier-EUI'
          - arch: x86_64
            runner: ubuntu-latest
            app_name: 'EasyTier-EUI.User'
          - arch: aarch64
            runner: ubuntu-latest
            app_name: 'EasyTier-EUI.User'
          # - arch: riscv64
          #   runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'  # 指定路径

      - name: Download frontend (User)
        if: ${{ matrix.app_name == 'EasyTier-EUI.User' }}
        uses: actions/download-artifact@v4
        with:
          name: frontend-user-dist
          path: frontend/dist

      - name: Download frontend
        if: ${{ matrix.app_name != 'EasyTier-EUI.User' }}
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Run build
        run: |
          echo "开始构建架构: ${{ matrix.arch }}"
          echo "Node 版本: $(node -v)"
          chmod +x ./fnpack.sh 2>/dev/null || true
          chmod +x ./version-util.sh 2>/dev/null || true
          chmod +x ./build-info.sh 2>/dev/null || true
          chmod +x ./build.sh 2>/dev/null || true
          ./build.sh arch=${{ matrix.arch }} et_ver="${{ needs.build-info.outputs.et_ver }}" build_ver="${{ needs.build-info.outputs.version }}" build_all="false" download_proxy="false" app_name="${{ matrix.app_name }}" 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpk-${{ matrix.app_name }}-${{ matrix.arch }}
          path: EasyTier-EUI*.fpk

  build-windows-amd64:
    if: ${{ github.event.inputs.build_windows == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

# 暂不使用 UPX 压缩，避免 杀软误报 ，22.4M -> 18.3M
#      - name: Install UPX
#        run: |#          choco install upx
#          upx --version

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Get pip cache dir
        id: pip-cache
        shell: bash
        run: echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: win64-pip-${{ hashFiles('backend/requirements-base.txt', 'backend/requirements-gui.txt') }}

      - name: Build
        run: cd backend && python build.py --et_ver "${{ needs.build-info.outputs.et_ver }}" --build_ver "${{ needs.build-info.outputs.version }}" --github_proxy_url "" --pip_cache_dir "${{ steps.pip-cache.outputs.dir }}" --pypi_mirror ""

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: backend/dist/*.zip

  build-macos-amd64:
    if: ${{ github.event.inputs.build_macos_x64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (x86_64)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: 'x64'

#      - name: Upgrade pip (x86_64)
#        run: arch -x86_64 pip install --upgrade pip

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mac-amd64-pip-${{ hashFiles('backend/requirements-base.txt', 'backend/requirements-gui.txt') }}

      - name: Build (x86_64)
        run: |
          cd backend
          arch -x86_64 python3 build.py --et_ver "${{ needs.build-info.outputs.et_ver }}" --build_ver "${{ needs.build-info.outputs.version }}" --github_proxy_url "" --pip_cache_dir ~/.cache/pip  --pypi_mirror ""
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: backend/dist/*.zip

  build-macos-arm64:
    if: ${{ github.event.inputs.build_macos_arm64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: arm64

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mac-arm64-pip-${{ hashFiles('backend/requirements-base.txt', 'backend/requirements-gui.txt') }}

      - name: Build
        run: cd backend && python3 build.py --et_ver "${{ needs.build-info.outputs.et_ver }}" --build_ver "${{ needs.build-info.outputs.version }}" --github_proxy_url "" --pip_cache_dir ~/.cache/pip  --pypi_mirror ""

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: backend/dist/*.zip

  build-linux-amd64:
    # 使用docker方式指定 glibc 版本 2.28
    if: ${{ github.event.inputs.build_linux_amd64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build custom environment image
        uses: docker/build-push-action@v5
        with:
          context: .github/docker
          file: .github/docker/linux-buildenv.Dockerfile
          platforms: linux/amd64
          tags: linux-buildenv:amd64
          load: true
          cache-from: type=gha,scope=linux-buildenv-amd64
          cache-to: type=gha,mode=max,scope=linux-buildenv-amd64

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: linux-amd64-pip-${{ hashFiles('backend/requirements-base.txt', 'backend/requirements-gui.txt') }}

      - name: Build in AMD64 container
        run: |
          docker run --rm --platform linux/amd64 \
            -v ${{ github.workspace }}:/workspace \
            -v ~/.cache/pip:/root/.cache/pip \
            -w /workspace \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e ET_VER=${{ needs.build-info.outputs.et_ver }} \
            -e BUILD_VER=${{ needs.build-info.outputs.version }} \
            linux-buildenv:amd64 \
            bash -c '
              export PIP_ROOT_USER_ACTION=ignore
              mkdir -p /root/.cache/pip && chown -R root:root /root/.cache/pip
              cd backend &&
              python3 build.py --et_ver "${ET_VER}" --build_ver "${BUILD_VER}" --github_proxy_url "" --pip_cache_dir /root/.cache/pip  --pypi_mirror ""
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: backend/dist/*.zip

  build-linux-arm64:
    # 使用docker方式指定 glibc 版本 2.28
    if: ${{ github.event.inputs.build_linux_arm64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build custom environment image
        uses: docker/build-push-action@v5
        with:
          context: .github/docker
          file: .github/docker/linux-buildenv.Dockerfile
          platforms: linux/arm64
          tags: linux-buildenv:arm64
          load: true
          cache-from: type=gha,scope=linux-buildenv-arm64
          cache-to: type=gha,mode=max,scope=linux-buildenv-arm64

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: linux-arm64-pip-${{ hashFiles('backend/requirements-base.txt', 'backend/requirements-gui.txt') }}

      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -v ~/.cache/pip:/root/.cache/pip \
            -w /workspace \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e ET_VER=${{ needs.build-info.outputs.et_ver }} \
            -e BUILD_VER=${{ needs.build-info.outputs.version }} \
            linux-buildenv:arm64 \
            bash -c '
              export PIP_ROOT_USER_ACTION=ignore
              mkdir -p /root/.cache/pip && chown -R root:root /root/.cache/pip
              cd backend &&
              python3 build.py --et_ver "${ET_VER}" --build_ver "${BUILD_VER}" --github_proxy_url "" --pip_cache_dir /root/.cache/pip  --pypi_mirror ""
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: backend/dist/*.zip

  build-linux-riscv64:
    # 使用docker方式指定 glibc 版本 2.28
    if: ${{ github.event.inputs.build_linux_riscv64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build custom environment image
        uses: docker/build-push-action@v5
        with:
          context: .github/docker
          file: .github/docker/linux-build-risvc64.Dockerfile
          platforms: linux/riscv64
          build-args: |
            BASE_IMAGE=riscv64/python:${{ env.PYTHON_VERSION }}
          tags: linux-buildenv:riscv64
          load: true
          cache-from: type=gha,scope=linux-buildenv-riscv64
          cache-to: type=gha,mode=max,scope=linux-buildenv-riscv64

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: riscv64-pip-${{ hashFiles('backend/requirements-base.txt', 'backend/requirements-gui.txt') }}

      - name: Build in RISC-V64 container
        run: |
          docker run --rm --platform linux/riscv64 \
            -v ${{ github.workspace }}:/workspace \
            -v ~/.cache/pip:/root/.cache/pip \
            -w /workspace \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e ET_VER=${{ needs.build-info.outputs.et_ver }} \
            -e BUILD_VER=${{ needs.build-info.outputs.version }} \
            linux-buildenv:riscv64 \
            bash -c '
              export PIP_ROOT_USER_ACTION=ignore
              mkdir -p /root/.cache/pip && chown -R root:root /root/.cache/pip
              cd backend &&
              python3 build.py --et_ver "${ET_VER}" --build_ver "${BUILD_VER}" --github_proxy_url "" --pip_cache_dir /root/.cache/pip  --pypi_mirror ""
            '
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-riscv64
          path: backend/dist/*.zip

  build-linux-armv7:
    if: ${{ github.event.inputs.build_linux_armv7 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build custom environment image
        uses: docker/build-push-action@v5
        with:
          context: .github/docker
          file: .github/docker/linux-buildenv.Dockerfile
          platforms: linux/arm/v7
#          build-args: |
#            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          tags: linux-buildenv:armv7
          load: true
          cache-from: type=gha,scope=linux-buildenv-armv7
          cache-to: type=gha,mode=max,scope=linux-buildenv-armv7

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: armv7-pip-${{ hashFiles('backend/requirements-base.txt', 'backend/requirements-gui.txt') }}

      - name: Build in ARMv7 container
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -v ~/.cache/pip:/root/.cache/pip \
            -w /workspace \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e ET_VER=${{ needs.build-info.outputs.et_ver }} \
            -e BUILD_VER=${{ needs.build-info.outputs.version }} \
            linux-buildenv:armv7 \
            sh -c '
              export PIP_ROOT_USER_ACTION=ignore
              mkdir -p /root/.cache/pip && chown -R root:root /root/.cache/pip
              cd backend &&
              python3 build.py --et_ver "${ET_VER}" --build_ver "${BUILD_VER}" --github_proxy_url "" --pip_cache_dir /root/.cache/pip  --pypi_mirror ""
            '
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-armv7
          path: backend/dist/*.zip

  # ========== Alpine musl 构建（用于 Docker 镜像） ==========
  build-linux-alpine:
    if: ${{ github.event.inputs.build_linux_alpine == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            artifact: linux-alpine-x64
            platform: linux/amd64
          - arch: arm64
            artifact: linux-alpine-arm64
            platform: linux/arm64
          - arch: riscv64
            artifact: linux-alpine-riscv64
            platform: linux/riscv64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: ${{ matrix.arch != 'amd64' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.arch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build Alpine buildenv image (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: .github/docker
          file: .github/docker/linux-buildenv-alpine.Dockerfile
          platforms: ${{ matrix.platform }}
          tags: linux-buildenv:alpine-${{ matrix.arch }}
          load: true
          cache-from: type=gha,scope=linux-buildenv-alpine-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=linux-buildenv-alpine-${{ matrix.arch }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: linux-alpine-${{ matrix.arch }}-pip-${{ hashFiles('backend/requirements-base.txt', 'backend/requirements-gui.txt') }}

      - name: Build in Alpine container (${{ matrix.arch }})
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -v ~/.cache/pip:/root/.cache/pip \
            -w /workspace \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e ET_VER=${{ needs.build-info.outputs.et_ver }} \
            -e BUILD_VER=${{ needs.build-info.outputs.version }} \
            linux-buildenv:alpine-${{ matrix.arch }} \
            sh -c '
              export PIP_ROOT_USER_ACTION=ignore
              mkdir -p /root/.cache/pip && chown -R root:root /root/.cache/pip
              cd backend &&
              python3 build.py --et_ver "${ET_VER}" --build_ver "${BUILD_VER}" --github_proxy_url "" --pip_cache_dir /root/.cache/pip --pypi_mirror ""
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: backend/dist/*.zip

  # ========== Docker 镜像构建 ==========
  build-docker:
    needs: [build-linux-alpine, build-info]
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() }}
    strategy:
      matrix:
        include:
          - arch: amd64
            artifact: linux-alpine-x64
          - arch: arm64
            artifact: linux-alpine-arm64
          - arch: riscv64
            artifact: linux-alpine-riscv64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (non-amd64 only)
        if: ${{ matrix.arch != 'amd64' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: buildx

      - name: Show Buildx info
        run: |
          docker buildx ls
          echo "BUILDX_NAME: ${{ steps.buildx.outputs.name }}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux artifact (${{ matrix.arch }})
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.arch }}

      - name: Extract and prepare Docker context
        run: |
          cd dist/${{ matrix.arch }}
          unzip -o *.zip -d extracted
          # 列出目录内容（不设置 DOCKER_CONTEXT 环境变量，避免与 Docker context 冲突）
          ls -la extracted/EasyTier-EUI

      - name: Verify context directory
        run: |
          CONTEXT_DIR="dist/${{ matrix.arch }}/extracted/EasyTier-EUI"
          echo "Checking context directory: $CONTEXT_DIR"
          if [ -d "$CONTEXT_DIR" ]; then
            echo "Directory exists"
            ls -la "$CONTEXT_DIR"
          else
            echo "Directory does NOT exist"
            find dist -type d 2>/dev/null | head -30
            exit 1
          fi

      - name: Build and push Docker image (${{ matrix.arch }})
        uses: docker/build-push-action@v4
        with:
          context: dist/${{ matrix.arch }}/extracted/EasyTier-EUI
          file: .github/docker/runtime.Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/easytier-eui:${{ matrix.arch }}-${{ needs.build-info.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/easytier-eui:${{ matrix.arch }}-latest
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}

  # 合并多架构 Manifest
  merge-docker-manifest:
    needs: [build-docker, build-info]
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/easytier-eui"
          VERSION="${{ needs.build-info.outputs.version }}"

          docker manifest create ${REPO}:${VERSION} \
            ${REPO}:amd64-${VERSION} \
            ${REPO}:arm64-${VERSION} \
            ${REPO}:riscv64-${VERSION}

          docker manifest create ${REPO}:latest \
            ${REPO}:amd64-latest \
            ${REPO}:arm64-latest \
            ${REPO}:riscv64-latest

          docker manifest push ${REPO}:${VERSION}
          docker manifest push ${REPO}:latest

  release:
    needs:
      - build-info
      - build-fnos
      - build-windows-amd64
      - build-macos-amd64
      - build-macos-arm64
      - build-linux-amd64
      - build-linux-arm64
      - build-linux-riscv64
      - build-linux-armv7
      - merge-docker-manifest
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/*.zip
            artifacts/*/*.fpk
          name: ${{ needs.build-info.outputs.version }}
          tag_name: ${{ needs.build-info.outputs.version }}
          draft: ${{ github.event.inputs.no-draft != 'true' }}
          prerelease: ${{ needs.build-info.outputs.prerelease == 'true' }}
          body: |
            ${{ needs.build-info.outputs.release_notes }}

            ---

            ### 飞牛系统 (fnOS) 版本说明

            | 包名前缀 | 类型 | 说明 |
            |:---|:---|:---|
            | **EasyTier-EUI** | 正常版 | 以 root 权限运行 |
            | **EasyTier-EUI.User** | 用户版 | 为适配官方上架要求，非 root 应用，部分功能不可用 |
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push FnDepot
        if: ${{ needs.build-info.outputs.prerelease == 'false' && github.event.inputs.no-draft == 'true' }}
        run: |
         new_version="${{ needs.build-info.outputs.version }}"
         changelog="${{ needs.build-info.outputs.release_notes }}"

         gh workflow run update-version.yml \
           --repo "710850609/FnDepot" \
           -f app_name="EasyTier-EUI" \
           -f new_version="$new_version" \
           -f download_url_amd64="https://github.com/710850609/EasyTier-EUI/releases/download/$new_version/EasyTier-EUI-fnos-x86_64-$new_version.fpk" \
           -f download_url_aarch64="https://github.com/710850609/EasyTier-EUI/releases/download/$new_version/EasyTier-EUI-fnos-aarch64-$new_version.fpk" \
           -f changelog="$changelog"
        env:
         GH_TOKEN: ${{ secrets.FNDEPOT_TOKEN }}