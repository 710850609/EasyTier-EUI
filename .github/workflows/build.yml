  release:
    needs:
      - build-info
      - build-fnos
      - build-windows-amd64
      - build-macos-amd64
      - build-macos-arm64
      - build-linux-amd64
      - build-linux-arm64
      - build-linux-riscv64
      - build-linux-armv7
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/*.zip
            artifacts/*/*.fpk
          name: ${{ needs.build-info.outputs.version }}
          tag_name: ${{ needs.build-info.outputs.version }}
          draft: ${{ github.event.inputs.no-draft != 'true' }}
          prerelease: ${{ needs.build-info.outputs.prerelease == 'true' }}
          body: ${{ needs.build-info.outputs.release_notes }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

#      - name: Push FnDepot
#        if: ${{ needs.build-info.outputs.prerelease == 'false' }}
#        run: |
