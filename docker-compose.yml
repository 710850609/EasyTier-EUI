services:
  easytier-eui:
    image: ghcr.io/710850609/easytier-eui:latest
    container_name: easytier-eui
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - PORT=5666
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped